services:
  deliveryix-sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: sqlserver-2019
    restart: always
    environment:
      SA_PASSWORD: "StrongPassword@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - deliveryix-sqlserver_data:/var/opt/mssql

  deliveryix-redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - deliveryix-redis_data:/data

volumes:
  deliveryix-sqlserver_data:
  deliveryix-redis_data:
