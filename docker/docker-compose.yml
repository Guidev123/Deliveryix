services:
  deliveryix-sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: sqlserver-2019
    restart: always
    environment:
      SA_PASSWORD: "StrongPassword@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - deliveryix-sqlserver_data:/var/opt/mssql

volumes:
  deliveryix-sqlserver_data:
